name: MediMesh CI Template

run-name: "${{ inputs.service_name }} — ${{ github.event.head_commit.message }} (${{ github.sha }})"

on:
  workflow_call:
    inputs:
      service_name:
        description: "Human-readable service name (e.g. medimesh-auth)"
        required: true
        type: string
      service_path:
        description: "Path to the service directory relative to repo root"
        required: true
        type: string
      docker_image_name:
        description: "Docker Hub image name (e.g. medimesh_medimesh-auth)"
        required: true
        type: string
      sonar_project_key:
        description: "SonarQube project key for this service"
        required: true
        type: string
      node_version:
        description: "Node.js version to use"
        required: false
        type: string
        default: "20"
      values_key:
        description: "Key in values.yaml (e.g. ambulance, auth)"
        required: true
        type: string
      manifest_repo:
        description: "ArgoCD manifest repository (org/repo)"
        required: false
        type: string
        default: "Medimesh-grp3/manifest_repo"

    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true
      SNYK_TOKEN:
        required: true
      SONARQUBE_TOKEN:
        required: true
      SONARQUBE_URL:
        required: true
      SMTP_USERNAME:
        required: true
      SMTP_PASSWORD:
        required: true
      ALERT_EMAIL:
        required: true
      MANIFEST_REPO_PAT:
        required: true

jobs:
  # 1. SonarQube — Code Quality Scan
  sonarqube:
    name: "1. SonarQube — ${{ inputs.service_name }}"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Analysis
        uses: SonarSource/sonarqube-scan-action@v2
        with:
          projectBaseDir: ${{ inputs.service_path }}
          args: >
            -Dsonar.projectKey=${{ inputs.sonar_project_key }}
            -Dsonar.projectName=${{ inputs.service_name }}
        env:
          SONAR_TOKEN: ${{ secrets.SONARQUBE_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONARQUBE_URL }}

      - name: Send Email on Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "MediMesh CI Failed — SonarQube (${{ inputs.service_name }})"
          to: ${{ secrets.ALERT_EMAIL }}
          from: MediMesh CI Pipeline
          body: |
            SonarQube code quality scan FAILED for: ${{ inputs.service_name }}

            Path   : ${{ inputs.service_path }}
            Branch : ${{ github.ref_name }}
            Commit : ${{ github.sha }}
            Author : ${{ github.actor }}

            Workflow Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  # 2. NPM Build — Install & Build Dependencies
  build:
    name: "2. Build — ${{ inputs.service_name }}"
    runs-on: ubuntu-latest
    needs: sonarqube
    defaults:
      run:
        working-directory: ${{ inputs.service_path }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ inputs.node_version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm
          cache-dependency-path: "${{ inputs.service_path }}/package.json"

      - name: Install Dependencies
        run: npm install --no-audit --no-fund

      - name: Build Project
        run: npm run build --if-present

      - name: Send Email on Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "MediMesh CI Failed — Build (${{ inputs.service_name }})"
          to: ${{ secrets.ALERT_EMAIL }}
          from: MediMesh CI Pipeline
          body: |
            NPM build FAILED for service: ${{ inputs.service_name }}

            Path   : ${{ inputs.service_path }}
            Branch : ${{ github.ref_name }}
            Commit : ${{ github.sha }}
            Author : ${{ github.actor }}

            Workflow Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  # 3. Snyk — Security Vulnerability Scan
  snyk:
    name: "3. Snyk — ${{ inputs.service_name }}"
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    defaults:
      run:
        working-directory: ${{ inputs.service_path }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ inputs.node_version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm
          cache-dependency-path: "${{ inputs.service_path }}/package.json"

      - name: Install Dependencies
        run: npm install --no-audit --no-fund

      - name: Setup Snyk CLI
        uses: snyk/actions/setup@master

      - name: Install snyk-to-html
        run: npm install -g snyk-to-html

      - name: Snyk Security Scan
        run: snyk test --severity-threshold=high --json-file-output=snyk-report.json || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Convert Snyk Report to HTML
        run: |
          if [ -f snyk-report.json ]; then
            snyk-to-html -i snyk-report.json -o snyk-report.html
            echo "Snyk HTML report generated"
          else
            echo "No Snyk JSON report found, skipping HTML conversion"
          fi

      - name: Upload Snyk HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: snyk-report-${{ inputs.service_name }}
          path: |
            ${{ inputs.service_path }}/snyk-report.html
            ${{ inputs.service_path }}/snyk-report.json
          retention-days: 14
          if-no-files-found: ignore

  # 4,5,6 Docker — Build, Scan, Push
  docker:
    name: "4,5,6 Docker — ${{ inputs.service_name }}"
    runs-on: ubuntu-latest
    needs: [build, snyk]
    permissions:
      contents: write
    outputs:
      version: ${{ steps.meta.outputs.version }}
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine Semantic Version
        id: version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ github.token }}
          tag_prefix: "${{ inputs.service_name }}/v"
          default_bump: patch
          initial_version: "1.0.0"
          custom_release_rules: "feature:minor:Features,breaking:major:Breaking Changes"
          dry_run: ${{ github.event_name == 'pull_request' }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Image Tags
        id: meta
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          VERSION="${{ steps.version.outputs.new_version }}"
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.docker_image_name }}"

          echo "image=${IMAGE}" >> $GITHUB_OUTPUT
          echo "tag_version=${IMAGE}:v${VERSION}" >> $GITHUB_OUTPUT
          echo "tag_version_sha=${IMAGE}:v${VERSION}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "tag_latest=${IMAGE}:latest" >> $GITHUB_OUTPUT
          echo "version=v${VERSION}" >> $GITHUB_OUTPUT

          echo "════════════════════════════════════════════════════"
          echo "  Image   : ${IMAGE}"
          echo "  Version : v${VERSION}"
          echo "  SHA Tag : v${VERSION}-${SHORT_SHA}"
          echo "  Latest  : latest"
          echo "════════════════════════════════════════════════════"

      - name: "4. Build Docker Image"
        run: |
          docker build \
            -t ${{ steps.meta.outputs.tag_version }} \
            -t ${{ steps.meta.outputs.tag_version_sha }} \
            -t ${{ steps.meta.outputs.tag_latest }} \
            -f ${{ inputs.service_path }}/Dockerfile \
            ${{ inputs.service_path }}

      - name: "5. Trivy — Container Image Scan"
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: ${{ steps.meta.outputs.tag_version }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: "6. Push Docker Image to DockerHub"
        if: github.event_name != 'pull_request'
        run: |
          echo "Pushing Docker images with semantic version tags..."
          docker push ${{ steps.meta.outputs.tag_version }}
          docker push ${{ steps.meta.outputs.tag_version_sha }}
          docker push ${{ steps.meta.outputs.tag_latest }}
          echo "All tags pushed successfully"

      - name: Send Email on Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "MediMesh CI Failed — Docker (${{ inputs.service_name }})"
          to: ${{ secrets.ALERT_EMAIL }}
          from: MediMesh CI Pipeline
          body: |
            Docker build/push FAILED for: ${{ inputs.service_name }}

            Image  : ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.docker_image_name }}
            Branch : ${{ github.ref_name }}
            Commit : ${{ github.sha }}
            Author : ${{ github.actor }}

            Workflow Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  # 7. ArgoCD — Update Manifest in GitOps Repo
  update-manifest:
    name: "⑦ CD ArgoCD — ${{ inputs.service_name }}"
    runs-on: ubuntu-latest
    needs: docker
    if: success() && github.event_name != 'pull_request'
    steps:
      - name: Checkout Manifest Repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.manifest_repo }}
          token: ${{ secrets.MANIFEST_REPO_PAT }}
          ref: main

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Show Current Tag
        run: |
          echo "Current tag for ${{ inputs.values_key }}:"
          yq '.image.tag' helm/medimesh/${{ inputs.values_key }}/values.yaml

      - name: Update Image Tag
        run: |
          yq -i \
            '.image.tag = "${{ needs.docker.outputs.image_tag }}"' \
            helm/medimesh/${{ inputs.values_key }}/values.yaml

          echo "New tag for ${{ inputs.values_key }}:"
          yq '.image.tag' helm/medimesh/${{ inputs.values_key }}/values.yaml

      - name: Commit and Push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add helm/medimesh/${{ inputs.values_key }}/values.yaml

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "cd(${{ inputs.service_name }}): image → ${{ needs.docker.outputs.image_tag }}"

          for i in 1 2 3 4 5; do
            git push && break
            echo "Push failed, retry $i/5..."
            git pull --rebase origin main
            sleep $((i * 2))
          done

      - name: Send Email on Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "MediMesh CD Failed — ${{ inputs.service_name }}"
          to: ${{ secrets.ALERT_EMAIL }}
          from: MediMesh CD Pipeline
          body: |
            CD manifest update FAILED for: ${{ inputs.service_name }}

            Image Tag  : ${{ needs.docker.outputs.image_tag }}
            Values File: helm/${{ inputs.values_key }}/values.yaml
            Author     : ${{ github.actor }}

            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            
  # Success Notification
  notify-success:
    name: "Success — ${{ inputs.service_name }}"
    runs-on: ubuntu-latest
    needs: [sonarqube, build, snyk, docker, update-manifest]
    if: success() && github.event_name != 'pull_request'
    steps:
      - name: Send Success Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "MediMesh CI/CD Passed — ${{ inputs.service_name }} (${{ needs.docker.outputs.version }})"
          to: ${{ secrets.ALERT_EMAIL }}
          from: MediMesh CI/CD Pipeline
          body: |
            ════════════════════════════════════════════════════════════
            MediMesh CI/CD Pipeline — SUCCESS
            ════════════════════════════════════════════════════════════

            Service : ${{ inputs.service_name }}
            Version : ${{ needs.docker.outputs.version }}
            Branch  : ${{ github.ref_name }}
            Commit  : ${{ github.sha }}
            Author  : ${{ github.actor }}

            ────────────────────────────────────────────────────────────
            Pipeline Results:
            ────────────────────────────────────────────────────────────
            SonarQube  — Code quality analysis
            NPM Build  — Dependencies installed & built
            Snyk       — Dependency vulnerability scan
            Docker     — Image built & pushed
            Trivy      — Container image scanned
            ArgoCD    — Manifest updated, deploying to cluster

            ────────────────────────────────────────────────────────────
            Docker Image Tags:
            ────────────────────────────────────────────────────────────
            → ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.docker_image_name }}:${{ needs.docker.outputs.version }}
            → ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.docker_image_name }}:latest

            ────────────────────────────────────────────────────────────
            ArgoCD Deployment:
            ────────────────────────────────────────────────────────────
            Values Key : ${{ inputs.values_key }}.image.tag
            New Tag    : ${{ needs.docker.outputs.version }}
            ArgoCD Repo: https://github.com/${{ inputs.manifest_repo }}
            ArgoCD will auto-sync within 3 minutes.

            Workflow Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            ════════════════════════════════════════════════════════════
